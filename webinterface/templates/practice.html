<div id="practice-container" class="transition duration-300 slide-in-content w-full h-full flex flex-col snap-center"
     style="min-height: calc(100dvh - 120px); min-height: calc(100vh - 120px);">
    <div class="glass shadow-glass-lg rounded-glass p-4 md:p-5 mb-4">
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
            <div>
                <div class="text-xs uppercase tracking-[0.24em] text-cyan-500 font-semibold">Visual Practice</div>
                <h2 id="practice-song-name" class="text-2xl md:text-3xl font-bold text-gray-700 dark:text-gray-100 mt-1">
                    No song loaded
                </h2>
                <p id="practice-status" class="text-sm md:text-base text-gray-600 dark:text-gray-300 mt-2">
                    Load a song in Songs, then start learning to see the falling notes.
                </p>
                <p id="practice-hint" class="text-sm text-gray-500 dark:text-gray-400 mt-1">
                    The Songs tab still controls song selection, tempo, mode, and loop points.
                </p>
            </div>
            <div class="flex flex-wrap items-center gap-3 lg:justify-end">
                <div class="glass-light rounded-glass px-4 py-3 min-w-[140px]">
                    <div class="text-[11px] uppercase tracking-[0.2em] text-gray-500 dark:text-gray-400">Mode</div>
                    <div id="practice-mode" class="text-lg font-semibold text-gray-700 dark:text-gray-100">Waiting</div>
                </div>
                <div class="glass-light rounded-glass px-4 py-3 min-w-[140px]">
                    <div class="text-[11px] uppercase tracking-[0.2em] text-gray-500 dark:text-gray-400">Song Time</div>
                    <div id="practice-current-time" class="text-lg font-semibold text-gray-700 dark:text-gray-100">0.00s</div>
                </div>
                <button onclick="history.pushState({}, '', '#songs'); loadAjax('songs');"
                        class="h-10 outline-none glass-light hover:glass font-semibold py-2 px-4 rounded-glass transition-smooth-fast">
                    Open Songs
                </button>
                <button onclick="change_setting('start_learning_song', '')"
                        class="h-10 outline-none glass-light hover:glass font-semibold py-2 px-4 rounded-glass transition-smooth-fast">
                    Start
                </button>
                <button onclick="change_setting('stop_learning_song', '')"
                        class="h-10 outline-none glass-light hover:glass font-semibold py-2 px-4 rounded-glass transition-smooth-fast">
                    Stop
                </button>
            </div>
        </div>
    </div>

    <div id="practice-stage"
         class="flex-1 glass shadow-glass-lg rounded-glass overflow-hidden relative"
         style="min-height: 620px;">
        <canvas id="practice-canvas" class="absolute inset-0 w-full h-full"></canvas>
        <div class="absolute left-4 top-4 text-xs text-gray-400 dark:text-gray-500 uppercase tracking-[0.24em]">
            Falling Notes
        </div>
        <div class="absolute right-4 bottom-4 text-xs text-right text-gray-500 dark:text-gray-400">
            Hit the glowing keys when the notes touch the line.
        </div>
    </div>
</div>
